<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Pet Adoption Website</title>
</head>
<body style="font-family: Arial; background-color: #f5f5f5; margin: 0; text-align: center;">

    <div style="padding:20px;">
        <header>
            <h1 style="color:rgb(15, 15, 158); background-color:lightgray; margin:0;">
                Virtual Pet Adoption Website
            </h1>
            <p><b>Find your new best friend!</b></p>
        </header>
    </div>

    <div style="width:320px; background-color:white; margin:30px auto; padding:15px; border-radius:10px; box-shadow:0px 0px 10px gray;">
        
        <img src="https://thumbs.dreamstime.com/b/adorable-golden-retriever-puppies-collection-delightful-photos-images-wallpapers-featuring-happy-playful-discover-351219230.jpg" 
        alt="Golden Retriever Puppy" 
        style="width:100%; height:200px; border-radius: 10px;">

        <h2>Bruno - Friendly Dog</h2>
        <p><strong>Age:</strong> 1 Year</p>
        <p><strong>Breed:</strong> Golden Retriever</p>
        <p>Bruno is very playful and loves children.</p>

        <h3>Dog Sound</h3>
        <audio controls style="width:100%;">
            <source src="lab.mp3" type="audio/mpeg">
        </audio>

        <h2>Pet Video</h2>
        <video width="100%" height="200" controls autoplay muted style="border-radius:10px;">
            <source src="labmp4.mp4" type="video/mp4">
        </video>

    </div>

    <div style="width:350px; background-color:white; margin:30px auto; padding:20px; border-radius:10px; box-shadow:0px 0px 10px gray;">
        
        <form>
            <h2 style="color:rgb(23, 77, 177)">Pet Adoption Form</h2>

            <label>Name:</label><br>
            <input type="text" placeholder="Enter your name" style="width:100%; padding:6px;"><br><br>

            <label>Email:</label><br>
            <input type="email" placeholder="Enter your email" style="width:100%; padding:6px;"><br><br>

            <label>Phone Number:</label><br>
            <input type="tel" placeholder="Enter your phone number" style="width:100%; padding:6px;"><br><br>

            <label>Select a pet:</label><br>
            <select style="width:100%; padding:6px;">
                <option>Bruno - Friendly Dog</option>
                <option>Bella - Playful Cat</option>
                <option>Charlie - Energetic Rabbit</option>
            </select><br><br>

            <label>Why do you want to adopt this pet?</label><br>
            <textarea rows="4" placeholder="Write your reason here..." style="width:100%; padding:6px;"></textarea><br><br>

            <button type="submit" style="width:100%; padding:10px; background-color:rgb(23, 77, 177); color:white; border:none; border-radius:5px;">
                Adopt Now
            </button><br><br>

            <button type="reset" style="padding:6px 15px;">Reset</button>
        </form>

    </div>

</body>
</html>
